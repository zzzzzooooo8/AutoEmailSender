name: Release Windows Desktop

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Test frontend
        working-directory: frontend
        run: npm run test

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Install backend dependencies
        working-directory: backend
        run: uv sync --dev

      - name: Test backend desktop runtime
        working-directory: backend
        run: uv run python -m unittest test.test_desktop_runtime

      - name: Build backend executable
        run: ./scripts/build-backend.ps1 -Clean
        shell: pwsh

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Test desktop
        working-directory: desktop
        run: npm test

      - name: Generate release notes
        run: node ./scripts/release-notes.mjs --version "${{ github.ref_name }}" --upper-ref "${{ github.sha }}" --output ./desktop/release-notes.md

      - name: Build and publish desktop release
        working-directory: desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run publish
